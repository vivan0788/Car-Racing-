<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>VivanX Racing Landscape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div id="score">Coins: 0</div>
        <button id="backNav" onclick="window.history.back()">← Back</button>
    </div>

    <div id="gameOverScreen" style="display: none;">
        <h1>CRASHED!</h1>
        <p id="finalScore">Total Coins: 0</p>
        <button onclick="location.reload()">RESTART</button>
    </div>

    <div id="controls">
        <div class="left-side">
            <button id="leftBtn">LEFT</button>
            <button id="rightBtn">RIGHT</button>
        </div>
        <div class="right-side">
            <button id="gasBtn">GAS</button>
            <button id="revBtn">REV</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
